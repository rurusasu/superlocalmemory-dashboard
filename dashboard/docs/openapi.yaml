openapi: 3.0.3
info:
  title: SuperLocalMemory Dashboard API
  description: REST API for the SuperLocalMemory Dashboard
  version: 0.1.0

servers:
  - url: /api
    description: Dashboard API (relative)

paths:
  /health:
    get:
      summary: System health check
      description: Returns system status including Ollama connectivity, database state, disk usage, and SLM statistics.
      operationId: getHealth
      responses:
        "200":
          description: Health check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /conversations:
    get:
      summary: List or search conversations
      description: Returns a paginated list of conversations. When `q` is provided, searches via `slm search`; otherwise lists via `slm list`.
      operationId: getConversations
      parameters:
        - name: q
          in: query
          description: Search query (max 200 characters)
          schema:
            type: string
            maxLength: 200
        - name: limit
          in: query
          description: Maximum number of results per page
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          description: Number of results to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationsResponse"
        "500":
          description: Server error (slm command failure or invalid output)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      summary: Daily memory statistics
      description: Returns daily memory counts for the last 30 days, suitable for chart rendering.
      operationId: getStats
      responses:
        "200":
          description: Statistics result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

  /healthz:
    get:
      summary: Liveness probe
      description: Lightweight check that the process is alive.
      operationId: getLiveness
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [alive]

  /readyz:
    get:
      summary: Readiness probe
      description: Checks that the application can accept requests (DB accessible, Ollama reachable).
      operationId: getReadiness
      responses:
        "200":
          description: Application is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzResponse"
        "503":
          description: Application is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzResponse"

  /startupz:
    get:
      summary: Startup probe
      description: Confirms initialization completion (database and config exist).
      operationId: getStartup
      responses:
        "200":
          description: Startup complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [started, starting]
        "503":
          description: Still starting
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [starting]

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded]
        ollama:
          type: string
          enum: [connected, disconnected, error]
        database:
          type: string
          enum: [ok, missing]
        diskUsage:
          type: string
          example: "128M"
        factCount:
          type: integer
        entityCount:
          type: integer
        mode:
          type: string
        profile:
          type: string
        dbSize:
          type: string
        timestamp:
          type: string
          format: date-time

    ConversationsResponse:
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
        count:
          type: integer
          description: Number of conversations in this page
        total:
          type: integer
          description: Total number of available conversations
        offset:
          type: integer
        limit:
          type: integer
        hasMore:
          type: boolean

    Conversation:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        source:
          type: string
        timestamp:
          type: string

    StatsResponse:
      type: object
      properties:
        dailyCounts:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              count:
                type: integer

    ReadyzResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          properties:
            database:
              type: object
              properties:
                ok:
                  type: boolean
                detail:
                  type: string
            ollama:
              type: object
              properties:
                ok:
                  type: boolean
                detail:
                  type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        conversations:
          type: array
          items: {}
        count:
          type: integer
