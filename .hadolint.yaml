---
# hadolint configuration
# https://github.com/hadolint/hadolint#configure

ignored:
  # Allow parameterized base images (multi-stage build with ARG)
  - DL3006
  # Allow apt-get without version pinning (base image controls versions)
  - DL3008
  # Allow pip install without version pinning (pinned inline)
  - DL3013
  # Allow pip install without --require-hashes
  - DL3042
  # Allow npm install without version pinning (global tools, always latest)
  - DL3016
  # Allow consecutive RUN instructions (readability over layer count)
  - DL3059

trustedRegistries:
  - docker.io
