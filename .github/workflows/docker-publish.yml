name: Docker Build & Publish

on:
  push:
    branches: [main]
  schedule:
    # Weekly security scan every Monday at 09:00 UTC
    - cron: "0 9 * * 1"

env:
  IMAGE_NAME: rurusasu/superlocalmemory-dashboard
  TRIVY_VERSION: 0.69.3

permissions:
  contents: write
  security-events: write

jobs:
  # ── 1. Security — source-level scans (always) ────
  trivy-config:
    name: Trivy Config Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v${{ env.TRIVY_VERSION }}
      - name: Run Trivy config scan
        run: |
          trivy config --format sarif --output trivy-config.sarif \
            --severity CRITICAL,HIGH .
      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v${{ env.TRIVY_VERSION }}
      - name: Run Trivy filesystem scan
        run: |
          trivy fs --format sarif --output trivy-fs.sarif \
            --severity CRITICAL,HIGH .
      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  # ── 2. Release — semantic-release (push only) ───
  release:
    name: Semantic Release
    needs: [trivy-config, trivy-fs, npm-audit]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new-release: ${{ steps.release.outputs.new-release-published }}
      version: ${{ steps.release.outputs.new-release-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: cd dashboard && npm ci
      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
        working-directory: dashboard

  # ── 3. Build — after release (new version only) ─
  build:
    name: Build Image
    needs: release
    if: needs.release.outputs.new-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.release.outputs.version }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm --entrypoint node \
            "${{ env.IMAGE_NAME }}:v${{ needs.release.outputs.version }}" \
            -e "console.log('smoke-test: ok')"

      - name: Save image
        run: |
          docker save "${{ env.IMAGE_NAME }}:v${{ needs.release.outputs.version }}" \
            | gzip > /tmp/image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v5
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  # ── 4. Image scan ───────────────────────────────
  image-scan:
    name: Trivy Image Scan
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v5
        with:
          name: docker-image
          path: /tmp
      - name: Load image
        run: docker load < /tmp/image.tar.gz
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v${{ env.TRIVY_VERSION }}
      - name: Trivy image scan
        run: |
          trivy image --format table --severity CRITICAL,HIGH \
            --exit-code 0 --input /tmp/image.tar.gz

  # ── 5. Push to Docker Hub ───────────────────────
  push:
    name: Push to Docker Hub
    needs: [release, build, image-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.release.outputs.version }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
