name: Docker Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  schedule:
    # Weekly security scan every Monday at 09:00 UTC
    - cron: "0 9 * * 1"

env:
  IMAGE_NAME: rurusasu/superlocalmemory-dashboard
  IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read
  security-events: write

jobs:
  # ── Security (tag + weekly) ───────────────────────
  trivy-config:
    name: Trivy Config Scan
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH
      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  trivy-fs:
    name: Trivy Filesystem Scan
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  npm-audit:
    name: npm audit
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  # ── Build (main push + tag) ──────────────────────
  build:
    name: Build Image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: env.IS_TAG == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ env.IS_TAG }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker run --rm --entrypoint node "${TAG}" -e "console.log('smoke-test: ok')"

      - name: Save image
        if: env.IS_TAG == 'true'
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker save "${TAG}" | gzip > /tmp/image.tar.gz

      - name: Upload image artifact
        if: env.IS_TAG == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  # ── Image scan (tag only, after build) ────────────
  image-scan:
    name: Trivy Image Scan
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - name: Load image
        run: docker load < /tmp/image.tar.gz
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          input: /tmp/image.tar.gz
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  # ── Push (tag only, after ALL checks pass) ────────
  push:
    name: Push to Docker Hub
    needs: [trivy-config, trivy-fs, npm-audit, build, image-scan]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
