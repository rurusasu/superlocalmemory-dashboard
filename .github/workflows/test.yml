name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dashboard-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm test

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -r requirements-dev.txt
      - run: python -m pytest tests/unit/ -v --cov=skills_tools --cov-report=term
